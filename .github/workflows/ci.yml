name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Run tests
        run: pytest -q

      - name: Smoke test CLI
        run: antirot lint examples/clean_paper.md --references examples/references.md --strict --min-score 90

      - name: Generate SARIF sample
        run: antirot lint examples/sloppy_paper.md --references examples/references.md --format sarif --output antirot.sarif

      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: antirot-sarif
          path: antirot.sarif

      - name: Upload SARIF to code scanning
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: antirot.sarif
          category: antirot
