name: Bug report
description: Report a broken rule, parser issue, or CLI regression.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: What broke?
      description: Describe the bug and the smallest draft or command that reproduces it.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Paste the command, draft snippet, references snippet, and actual output.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: Explain what AntiRot should have reported instead.
    validations:
      required: true
